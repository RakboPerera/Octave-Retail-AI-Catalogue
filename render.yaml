services:
  - type: web
    name: octave-retail-agents
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true

    # Pin Node so PR previews and production build identically
    envVars:
      - key: NODE_VERSION
        value: 20.11.1

    # SPA fallback — every path serves index.html, React Router handles it client-side
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    headers:
      # Long-cache the hashed asset files Vite emits (safe — their filenames change on each build)
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

      # Never cache the entrypoint — otherwise users get stale shells on deploys
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate

      # Security headers
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), payment=()
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
